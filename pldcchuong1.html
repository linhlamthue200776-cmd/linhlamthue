<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">
  <button class="back-btn" onclick="goBack()">← Trở về</button>
  <div id="score">Đúng: 0 / 0</div>
  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>
</div>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>

  <div class="buttons">
    <button class="nav" onclick="prevQuestion()">← Câu trước</button>
    <button class="nav" onclick="nextQuestion()">Câu tiếp →</button>
  </div>
</div>

<!-- POPUP KẾT QUẢ -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3>🎉 Hoàn thành</h3>
    <p id="finalScore"></p>
    <button onclick="okReload()">OK</button>
  </div>
</div>

<script>
let index = 0;
let score = 0;
let userAnswers = [];
let questions = [];

/* ===== DỮ LIỆU ===== */
const rawQuestions = [
{
    q: "Bản chất của nhà nước được đặc trưng bởi nội dung nào dưới đây:",
    a: [

      "Nhà nước thực hiện các chính sách phục vụ cho xã hội.",
      "Nhà nước chỉ bảo vệ quyền lợi của giai cấp cầm quyền"
    ],
    c: 0
  },
  {
    q: "Đâu là sự khác biệt giữa Nhà nước và các tổ chức khác trong xã hội?",
    a: [
      "Có lãnh thổ và phân chia các cơ quan nhà nước theo các đơn vị hành chính, lãnh thổ.",
      "Quản lý xã hội bằng hệ thống các quy phạm",
      "Thiết lập quyền lực công cộng đặc biệt",
      "Quy định và thu các loại phí dưới các hình thức bắt buộc."
    ],
    c: 2
  },
  {
    q: "Hình thức của nhà nước được thể hiện qua các yếu tố nào?",
    a: [
      "Hình thức nhà nước đơn nhất và hình thức nhà nước liên bang.",
      "Hình thức chính thể quân chủ và hình thức chính thể cộng hòa.",
      "Hình thức chính thể, hình thức cấu trúc nhà nước và chế độ chính trị.",
      "Chế độ dân chủ và chế độ phản dân chủ."
    ],
    c: 2
  },
  {
    q: "Hình thức chính thể của nhà nước có hai dạng cơ bản là:",
    a: [
      "Chính thể quân chủ và chính thể cộng hòa dân chủ.",
      "Chính thể cộng hòa dân chủ và chính thể cộng hòa quý tộc",
      "Chính thể quân chủ chuyên chế và chính thể quân chủ lập hiến",
      "Chính thể quân chủ và chính thể cộng hòa"
    ],
    c: 3
  },
  {
    q: "Các kiểu nhà nước trong lịch sử gồm:",
    a: [
      "Nhà nước chủ nô, nhà nước phong kiến, nhà nước tư sản, nhà nước xã hội chủ nghĩa",
      "Cộng sản nguyên thủy, chiếm hữu nô lệ, phong kiến, tư bản chủ nghĩa, xã hội chủ nghĩa",
      "Nhà nước đơn nhất, nhà nước liên bang, nhà nước liên minh, liên minh các nhà nước.",
      "Nhà nước chủ nô, nhà nước phong kiến, nhà nước tư sản, nhà nước cộng sản"
    ],
    c: 0
  },
  {
    q: "Sự tồn tại của nhà nước là:",
    a: [
      "Là do ý chí của mọi thành viên trong xã hội với mong muốn là thành lập nên nhà nước để bảo vệ trật tự chung.",
      "Là kết quả tất yếu của xã hội loài người, ở đâu có xã hội thì ở đó tồn tại nhà nước.",
      "Là kết quả tất yếu của xã hội có giai cấp.",
      "Là do các thành viên trong xã hội cùng ký kết một khế ước chung."
    ],

  {
    q: "Xét từ góc độ giai cấp, nhà nước ra đời vì:",
    a: [
      "Sự xuất hiện của các giai cấp và quan hệ giai cấp.",
      "Sự xuất hiện của các giai cấp và đấu tranh giai cấp.",
      "Nhu cầu giải quyết các mối quan hệ giai cấp.",

  },
  {
    q: "Học thuyết Mác-Lênin nhận định thế nào về bản chất nhà nước và tính chất giai cấp của Nhà nước:",
    a: [
      "Tính chất giai cấp và bản chất nhà nước luôn luôn thay đổi qua các kiểu nhà nước khác nhau.",
      "Tính chất giai cấp của nhà nước không thay đổi, còn bản chất nhà nước là luôn luôn thay đổi qua các kiểu nhà nước khác nhau.",
      "Tính chất giai cấp và bản chất nhà nước không thay đổi qua các kiểu nhà nước khác nhau.",
      "Tính chất giai cấp của nhà nước luôn luôn thay đổi, còn bản chất nhà nước là không thay đổi qua các kiểu nhà nước khác nhau."
    ],
    c: 3
  },
  {
    q: "Nhà nước khác tổ chức thị tộc, bộ lạc ở yếu tố nào sau đây:",
    a: [
      "Quản lý xã hội bằng quy phạm xã hội.",
      "Phân chia dân cư theo đơn vị hành chính lãnh thổ",
      "Thiết lập quyền lực chung hòa nhập với dân cư.",
      "Duy trì trật tự xã hội bằng uy tín của bô lão, người cao tuổi trong thị tộc."
    ],
    c: 1
  },
  {
    q: "Điền vào chỗ trống: “Các………thể hiện tính chất độc tài cũng có nhiều loại, đáng chú ý nhất khi những phương pháp này phát triển đến độ cao sẽ trở thành những phương pháp tàn bạo, quân phiệt và phát xít.”",
    a: [
      "Phương pháp dân chủ hạn chế.",
      "Phương pháp dân chủ giả điệu.",
      "Phương pháp phản dân chủ.",
      "Phương pháp dân chủ gián tiếp."
    ],
    c: 2
  },
{
    q: "Trong nhà nước quân chủ chuyên chế:",
    a: [
      "Quyền lực nhà nước tối cao thuộc về một cơ quan tập thể và do bầu cử mà ra.",
      "Quyền lực nhà nước thuộc về một người và được hình thành theo phương thức thừa kế.",
      "Quyền lực nhà nước tối cao thuộc về một người và được hình thành do bầu cử.",
      "Quyền lực nhà nước thuộc về một tập thể, được hình thành theo phương thức thừa kế."
    ],
    c: 1
  },
  {
    q: "Đặc điểm nào dưới đây thể hiện đúng nhất về nhà nước liên bang:",
    a: [
      "Có hai hệ thống cơ quan nhà nước; Có hai hệ thống pháp luật; Nhà nước có chủ quyền chung.",
      "Có hai hệ thống cơ quan nhà nước, nhà nước có chủ quyền chung đồng thời mỗi nước thành viên cũng có chủ quyền riêng; Công dân có hai quốc tịch, có hai hệ thống pháp luật.",
      "Có hai hệ thống cơ quan nhà nước, nhà nước có chủ quyền chung đồng thời mỗi nước thành viên cũng có chủ quyền riêng có thể tự mình tách ra thành nhà nước độc lập;.",
      "Có hai hệ thống cơ quan nhà nước, nhà nước có chủ quyền chung đồng thời mỗi nước thành viên cũng có chủ quyền riêng có thể tự mình tách ra thành nhà nước độc lập; Công dân có hai quốc tịch, có hai hệ thống pháp luật."
    ],
    c: 2
  },
  {
    q: "Khẳng định nào dưới đây là sai?",
    a: [
      "Các nhà nước tất yếu phải trải qua bốn kiểu nhà nước.",
      "Sự thay thế các kiểu nhà nước là mang tính khách quan;",
      "Sự thay thế các kiểu nhà nước diễn ra bằng một cuộc cách mạng.",
      "Kiểu nhà nước sau tiến bộ hơn kiểu nhà nước trước."
    ],
    c: 0
  },
  {
    q: "Nhà nước nào sau đây là nhà nước có chính thể quân chủ hạn chế :",
    a: [
      "Pháp",
      "Bỉ",
      "Triều Tiên",
      "Đức"
    ],
    c: 1
  },
  {
    q: "Nhà nước Trung Quốc có hình thức cấu trúc:",
    a: [
      "Nhà nước liên bang.",
      "Nhà nước đơn nhất.",
      "Nhà nước liên minh.",
      "Nhà nước có các khu tự trị."
    ],
    c: 1
  },
  {
    q: "Nguyên  nhân  dẫn  đến  sự  thay  thế  các  kiểu  Nhà  nước trong lịch sử là:",
    a: [
      "Do ý chí của giai cấp thống trị xã hội",
      "Do sự phát triển tự nhiên của xã hội",
      "Do mâu thuẫn giữa  lực  lượng sản  xuất và quan  hệ sản xuất trong xã hội",
      "Do sự vận động, phát triển, thay thế các hình thái kinh tế -  xã hội mà nhân tố làm nên sự thay thế đó là các cuộc cách mạng xã hội"
    ],
    c: 3
  },
  {
    q: "Khẳng định nào dưới đây là sai?",
    a: [
      "Nhà nước tồn tại trong mọi hình thái kinh tế xã hội.",
      "Nhà nước chỉ sinh ra và tồn tại trong xã hội có giai cấp.",
      "Nhà nước là sản phẩm và biểu hiện của những mâu thuẫn giai cấp không thể điều hòa được.",
      "Nhà nước là công cụ để thể hiện ý chí, củng cố và bảo vệ lợi ích của giai cấp cầm quyền trong xã hội."
    ],
    c: 0
  },
  {
    q: "Việc đưa ra các quan điểm, học thuyết về nhà nước là để:",
    a: [
      "Che đậy bản chất giai cấp của nhà nước",
      "Giải thích về sự tồn tại và phát triển của nhà nước.",
      "Bảo vệ nhà nước của giai cấp thống trị.",
      "Lý giải một cách thiếu căn cứ khoa học về nhà nước."
    ],
    c: 1
  },
  {
    q: "Lựa chọn quá trình đúng nhất về sự ra đời của nhà nước:",
    a: [
      "Sản xuất phát triển, tư hữu hình thành, phân hóa giai cấp, xuất hiện nhà nước.",
      "Ba lần phân công lao động, tư hữu xuất hiện; phân hóa giai cấp; xuất hiện nhà nước.",
      "Sản xuất phát triển, tư hữu xuất hiện, đấu tranh giai cấp, xuất hiện nhà nước.",
      "Ba lần phân công lao động, xuất hiện tư tưởng, mâu thuẫn giai cấp, xuất hiện nhà nước."
    ],
    c: 1
  },
];

/* ===== TRỘN ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ===== KHỞI TẠO ===== */
function startQuiz() {
  index = 0;
  score = 0;
  userAnswers = [];

  questions = JSON.parse(JSON.stringify(rawQuestions));
  shuffle(questions);

  questions.forEach(q => {
    const correct = q.a[q.c];
    shuffle(q.a);
    q.c = q.a.indexOf(correct);
  });

  loadQuestion();
}

/* ===== LOAD ===== */
function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index + 1}: ${q.q}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = text;
    div.onclick = () => checkAnswer(div, i);
    answersDiv.appendChild(div);

    if (userAnswers[index] !== undefined) {
      if (i === q.c) div.classList.add("correct");
      if (i === userAnswers[index] && i !== q.c)
        div.classList.add("wrong");
      div.onclick = null;
    }
  });

  updateScore();
}

/* ===== CHỌN ===== */
function checkAnswer(el, i) {
  if (userAnswers[index] !== undefined) return;

  userAnswers[index] = i;

  if (i === questions[index].c) {
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    document.querySelectorAll(".answer")[questions[index].c]
      .classList.add("correct");
  }

  updateScore();
}

/* ===== ĐIỀU HƯỚNG ===== */
function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

/* ===== MODAL ===== */
function showResult() {
  document.getElementById("finalScore").innerText =
    `Đúng: ${score} / ${questions.length}`;
  document.getElementById("resultModal").style.display = "block";
}

function okReload() {
  document.getElementById("resultModal").style.display = "none";
  startQuiz();
}

/* ===== LÀM LẠI ===== */
function resetQuiz() {
  if (confirm("Bạn có chắc muốn làm lại?")) {
    startQuiz();
  }
}

/* ===== ĐIỂM ===== */
function updateScore() {
  document.getElementById("score").innerText =
    `Đúng: ${score} / ${questions.length}`;
}

startQuiz();
function goBack() {
  window.history.back();
}  
</script>

</body>
</html>
