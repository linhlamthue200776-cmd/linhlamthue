<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">
  <button class="back-btn" onclick="goBack()">← Trở về</button>
  <div id="score">Đúng: 0 / 0</div>
  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>

  <div class="buttons">
    <button class="nav" onclick="prevQuestion()">← Câu trước</button>
    <button class="nav" onclick="nextQuestion()">Câu tiếp →</button>
  </div>
</div>

<!-- POPUP KẾT QUẢ -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3>🎉 Hoàn thành</h3>
    <p id="finalScore"></p>
    <button onclick="okReload()">OK</button>
  </div>
</div>

q: "K và H là vợ chồng hợp pháp, một thời gian sau K đã chung sống như vợ chồng với X và dùng toàn bộ thu nhập của mình để chi phí cho X. Khi H có thai đứa con thứ 2 thì yêu cầu K có trách nhiệm chu cấp tiền sinh hoạt phí cho gia đình nhưng K từ chối và bỏ đến nhà ở với X. Tình huống này được giải quyết như thế nào đúng theo quy định của pháp luật?",
a: [
"H có quyền yêu cầu hủy kết hôn trái luật của K và X và yêu cầu chia số tài sản chung phát sinh giữa 2 vợ chồng bao gồm cả thu nhập của K trong suốt thời gian K chung sống với X, đồng thời yêu cầu K thực hiện nghĩa vụ chu cấp cho 2 đứa con chung của K và H.",
"K có quyền yêu cầu đơn phương ly hôn với H để hợp pháp hoá mối quan hệ với X.",
"H có quyền yêu cầu ly hôn và yêu cầu K thực hiện nghĩa vụ chu cấp cho 2 đứa con chung của H và K.",
"H có quyền yêu cầu ly hôn và yêu cầu chia số tài sản chung phát sinh giữa 2 vợ chồng bao gồm cả thu nhập của K trong suốt thời gian K chung sống với X, đồng thời yêu cầu K thực hiện nghĩa vụ chu cấp cho 2 đứa con chung của K và H."
],
c: 3
},
{
q: "K và H là vợ chồng hợp pháp, có tài sản chung là 500 triệu đồng, 2 người đã thoả thuận bằng văn bản chia đôi phần tài sản chung mỗi người 250 triệu cho mỗi người. Sau 3 năm K dùng tiền để kinh doanh thu được khoản lợi tức là 200 triệu đồng, hàng tháng H được hưởng lương là 5 triệu đồng và chi tiêu dùng hết cho đời sống gia đình. Sau đó K đã chung sống như vợ chồng với X và dùng số tiền lợi tức đó cho người tình của mình. Tình huống này được giải quyết như thế nào đúng theo quy định của pháp luật?",
a: [
"H có quyền yêu cầu hủy kết hôn trái luật của K và X và yêu cầu chia đôi khoản lợi tức 200 triệu vì đó là tài sản chung của vợ chồng.",
"H có quyền yêu cầu ly hôn và yêu cầu chia đôi khoản lợi tức 200 triệu vì đó là tài sản chung của vợ chồng.",
"H có quyền yêu cầu ly hôn và không được yêu cầu chia đôi khoản lợi tức 200 triệu vì đó là tài sản riêng của K.",
"H có quyền yêu cầu ly hôn và yêu cầu chia số tài sản chung phát sinh giữa 2 vợ chồng bao gồm cả số tiền gốc 250 triệu và 200 triệu tiền lợi tức kinh doanh."
],
c: 2
},
{
q: "K và H cùng làng có tình cảm với nhau nên đã chung sống như vợ chồng từ năm 2013, mua chung 1 căn nhà trị giá 400 triệu. Tháng 03/2014, anh K đi làm xa và đã đăng ký kết hôn với chị X để hợp pháp hóa việc phân nhà tập thể của công ty, có một con chung sinh năm 2015. Tháng 06/2016, chị H biết mình có thai đi tìm anh K thì phát hiện được sự việc trên và yêu cầu anh K chấm dứt quan hệ với chị X, nhưng K không quay lại với H. Tình huống này được giải quyết như thế nào đúng theo quy định của pháp luật?",
a: [
"H có quyền yêu cầu hủy kết hôn trái luật của K và X và yêu cầu chia đôi căn nhà là tài sản chung của vợ chồng.",
"H có quyền yêu cầu chia đôi căn nhà là tài sản chung của K và H, yêu cầu K có nghĩa vụ với con chung của K và H.",
"H có quyền yêu cầu ly hôn và yêu cầu chia đôi căn nhà là tài sản chung của K và H, yêu cầu K có nghĩa vụ với con chung của K và H.",
"H không có quyền yêu cầu hủy kết hôn trái luật của K và X; H được yêu cầu chia đôi căn nhà là tài sản chung của K, H đồng thời yêu cầu K có nghĩa vụ với con chung của hai người."
],
c: 3
},
{
q: "Năm 2006, anh K được Cha mẹ mình tặng cho 1 căn nhà diện tích 40 m2. Năm 2008, K kết hôn với H và có 2 con chung về sống chung trong căn nhà được tặng cho. Năm 2010, chị H cũng được bố mẹ mình tặng cho 1 mảnh đất trị giá 400 triệu. Hai vợ chồng có tài sản chung là 4 tỉ đồng. Năm 2014 anh K chết trong 1 tai nạn giao thông. Sau khi anh K chết, bố mẹ của K yêu cầu bà H trả lại căn nhà kèm với chia cho ông bà thừa kế một phần giá trị của một nửa mảnh đất của bà B với lý do căn nhà là do ông bà cho con trai mình, mảnh đất là tài sản có sau khi kết hôn nên có phần của anh K và ông bà không còn khả năng lao động, không có tài sản để tự nuôi mình và hiện tại không có ai nuôi dưỡng, cấp dưỡng. Theo anh chị thì Tòa án sẽ giải quyết như thế nào?",
a: [
"Toà trả lại căn nhà cho bố mẹ anh K và yêu cầu chia thừa kế một phần giá trị mảnh đất là tài sản chung của vợ chồng K và H",
"Toà không trả lại căn nhà mà căn nhà là tài sản thừa kế của anh K nên được chia theo pháp luật về thừa kế, mảnh đất là tài sản riêng của chị H nên không được đưa vào chia thừa kế.",
"Toà trả lại căn nhà cho bố mẹ anh K và không thực hiện yêu cầu chia thừa kế một phần giá trị mảnh đất do mảnh đất là tài sản riêng của chị H.",
"Toà không trả lại căn nhà mà căn nhà là tài sản thừa kế của anh K nên được chia theo pháp luật về thừa kế và thực hiện yêu cầu chia thừa kế một phần giá trị mảnh đất là tài sản chung của vợ chồng K và H"
],
c: 1
},

{
q: "Theo quy định của pháp luật về quyền và nghĩa vụ tài sản của vợ chồng thì khẳng định nào sau đây đúng.",
a: [
"Tài sản chung của vợ chồng là tài sản mà vợ chồng được thừa kế chung hoặc được tặng cho chung và những tài sản khác mà vợ chồng thoả thuận là tài sản chung và vợ chồng không thể chia tài sản chung.",
"Tài sản chung của vợ chồng gồm tài sản mà mỗi người có trước khi kết hôn; những thu nhập hợp pháp khác của vợ chồng trong thời kỳ hôn nhân.",
"Tài sản chung của vợ chồng là tài sản do vợ, chồng tạo ra, thu nhập do lao động, hoạt động sản xuất, kinh doanh và những thu nhập hợp pháp khác của vợ chồng trong thời kỳ hôn nhân và vợ chồng đều có quyền và nghĩa vụ chiếm hữu, sử dụng",
"Tài sản chung của vợ chồng là tài sản do vợ, chồng tạo ra, thu nhập do lao động, hoạt động sản xuất, kinh doanh và những thu nhập hợp pháp khác của vợ chồng trước thời kỳ hôn nhân"
],
c: 2
},

{
q: "Theo quy định của pháp luật về quyền và nghĩa vụ tài sản riêng của vợ chồng thì khẳng định nào sau đây đúng:",
a: [
"Vợ; chồng có toàn quyền chiếm hữu, sử dụng, định đoạt tài sản riêng của mình",
"Vợ; chồng có quyền chiếm hữu, sử dụng tài sản riêng của mình và việc định đoạt tài sản riêng đã đưa vào sử dụng chung là nguồn sống duy nhất của gia đình phải được sự thoả thuận của cả vợ chồng.",
"Vợ, chồng có quyền chiếm hữu, sử dụng, định đoạt tài sản riêng của mình và việc định đoạt tài sản riêng đã đưa vào sử dụng chung mà hoa lợi, lợi tức từ tài sản riêng đó là nguồn sống duy nhất của gia đình phải được sự thoả thuận của cả vợ chồng.",
"Vợ, chồng có quyền chiếm hữu, sử dụng, định đoạt tài sản riêng của mình và việc chiếm hữu tài sản riêng đã đưa vào sử dụng chung mà hoa lợi, lợi tức từ tài sản riêng đó là nguồn sống duy nhất của gia đình phải được sự thoả thuận của cả vợ chồng."
],
c: 2
},

{
q: "Theo quy định của pháp luật về hậu quả pháp lý sau ly hôn thì khẳng định nào sau đây là sai:",
a: [
"Sau khi ly hôn, vợ, chồng vẫn có nghĩa vụ trông nom, chăm sóc, giáo dục, nuôi dưỡng tất cả con chung của hai người.",
"Sau khi ly hôn, người không trực tiếp nuôi con có nghĩa vụ cấp dưỡng nuôi con",
"Sau khi ly hôn, người không trực tiếp nuôi con có quyền thăm nom con; không ai được cản trở người đó thực hiện quyền này",
"Sau khi ly hôn con dưới 36 tháng tuổi được giao cho mẹ trực tiếp nuôi, nếu các bên không có thoả thuận khác."
],
c: 2
},

{
q: "Theo quy định của pháp luật về quyền trông nom, chăm sóc, giáo dục con, quản lý tài sản riêng của con hoặc đại diện theo pháp luật cho con của cha mẹ thì khẳng định nào sau đây là đúng:",
a: [
"Không thể bị hạn chế",
"Bị hạn chế khi cha mẹ không nuôi dưỡng, chăm sóc con cái đúng nghĩa vụ",
"Bị hạn chế khi cha mẹ đã bị kết án về một trong các tội cố ý xâm phạm sức khoẻ, nhân phẩm, danh dự của con và cha, mẹ đã bị Toà án hạn chế quyền đối với con chưa thành niên không phải thực hiện nghĩa vụ nuôi dưỡng con.",
"Bị hạn chế khi cha mẹ đã bị kết án về một trong các tội cố ý xâm phạm sức khoẻ, nhân phẩm, danh dự của con và cha, mẹ đã bị Toà án hạn chế quyền đối với con chưa thành niên vẫn phải thực hiện nghĩa vụ nuôi dưỡng con."
],
c: 3
},
{
q: "Ý nghĩa pháp lý của việc đăng kí kết hôn là:",
a: [
"Để các cơ quan nhà nước quản lý về hộ tịch, không có ý nghĩa với các bên kết hôn",
"Có cơ sở xác định cha mẹ con khi bên nữ sinh con",
"Có cơ sở pháp lý để bảo vệ quyền và lợi ích của hai người kết hôn",
"Có cơ sở làm giấy khai sinh cho con"
],
c: 2
},
{
q: "Năng lực hành vi của chủ thể quan hệ pháp luật hôn nhân và gia đình có thể được xác lập từ khi:",
a: [
"Chủ thể được sinh ra",
"Chủ thể đạt độ tuổi thành niên và có khả năng nhận thức điều khiển hành vi",
"Nam từ đủ 20 tuổi, nữ từ đủ 18 tuổi.",
"Không xác định được độ tuổi chung cho các chủ thể"
],
c: 2
},
{
q: "Sau khi cưới, An và Bình được bố mẹ hai bên cho tiền để mua một căn nhà ở Hà Nội, căn nhà này mang tên hai vợ chồng An Bình. Năm 2016, An bị tai nạn giao thông chết; tháng 6/2016 Bình chuyển về sống chung với bố mẹ đẻ tại Thái Nguyên và có ý định bán căn nhà của hai vợ chồng tại Hà Nội. Biết chuyện, bố mẹ đẻ của An phản đối và yêu cầu chia căn nhà theo quy định của pháp luật về thừa kế. Yêu cầu của bố mẹ đẻ anh An có đúng không? Căn nhà chung của An và Bình sẽ giải quyết thế nào?",
a: [
"Bố mẹ của An có quyền yêu cầu chia căn nhà vì đây là phần di sản mà An để lại và họ là những người thừa kế theo pháp luật của An. Căn nhà của An và Bình sẽ được chia đôi. Một nửa giá trị căn nhà thuộc về An sẽ được chia cho bố mẹ của An.",
"Bố mẹ của An không có quyền yêu cầu chia căn nhà vì nó là tài sản chung của vợ chồng An Bình, căn nhà mang tên hai vợ chồng nên khi An chết, Bình là chủ sở hữu duy nhất có quyền định đoạt bán căn nhà theo quy định của Bộ luật dân sự.",
"Bố mẹ của An có quyền yêu cầu chia căn nhà vì đây là phần di sản mà An để lại và họ là những người thừa kế theo pháp luật của An. Căn nhà của An và Bình sẽ được giải quyết theo thủ tục chia di sản thừa kế của Bộ luật dân sự.",
"Bố mẹ của An có quyền yêu cầu chia căn nhà vì nó là phần di sản mà An để lại và họ cũng là những người thừa kế duy nhất của An. Căn nhà của An và Bình sẽ được trả lại cho bố mẹ đẻ của An. Bình không có quyền bán căn nhà."
],
c: 2
},
{
q: "Nam và Bắc đều là sinh viên của một trường đại học. Sau một thời gian yêu đương, hai người quyết định chuyển về sống chung với nhau như vợ chồng mà không có đăng ký kết hôn. Trong quá trình chung sống cả hai cùng mua sắm rất nhiều tài sản chung. Sau 8 tháng chung sống, hai người phát sinh mẫu thuẫn và chia tay. Việc Nam và Bắc sống chung với nhau như vợ chồng mà không có đăng ký kết hôn có vi phạm pháp luật không? Vì sao? Khi Nam và Bắc chia tay thì số tài sản chung phát sinh trong thời gian sống chung giải quyết như thế nào",
a: [
"Việc Nam và Bắc chung sống như vợ chồng mà không có đăng ký kết hôn không vi phạm pháp luật nếu cả hai đã có đủ năng lực hành vi dân sự, tự nguyện chung sống với nhau. Số tài sản chung sẽ giải quyết theo trình tự pháp luật dân sự. Tài sản được chia theo thỏa thuận của các bên, nếu không tự thỏa thuận được thì chia theo công sức đóng góp của mỗi bên trong quá trình tạo lập, quản lý tài sản.",
"Việc Nam và Bắc chung sống như vợ chồng mà không có đăng ký kết hôn không vi phạm pháp luật nếu cả hai đã có đủ năng lực hành vi dân sự, tự nguyện chung sống với nhau. Số tài sản chung sẽ giải quyết giống như vợ chồng khi ly hôn, theo trình tự pháp luật hôn nhân và gia đình, về nguyên tắc tài sản chung được chia đôi, có tính đến một số yếu tố khác.",
"Việc Nam và Bắc chung sống như vợ chồng mà không có đăng ký kết hôn là vi phạm pháp luật. Vì không có cơ sở pháp lý để bảo vệ quyền và lợi ích của hai người. Số tài sản chung sẽ giải quyết theo trình tự pháp luật dân sự. Tài sản được chia theo thỏa thuận của các bên, nếu không tự thỏa thuận được thì chia theo công sức đóng góp của mỗi bên trong quá trình tạo lập, quản lý tài sản.",
"Việc Nam và Bắc chung sống như vợ chồng mà không có đăng ký kết hôn là vi phạm pháp luật. Vì không có cơ sở pháp lý để bảo vệ quyền và lợi ích của hai người. Số tài sản chung sẽ giải quyết giống như vợ chồng khi ly hôn, theo trình tự pháp luật hôn nhân và gia đình, về nguyên tắc tài sản chung được chia đôi, có tính đến một số yếu tố khác"
],
c: 0
},
{
q: "Vợ chồng có các nghĩa vụ chung về tài sản khi:",
a: [
"Nghĩa vụ do vợ hoặc chồng thực hiện nhằm đáp ứng nhu cầu thiết yếu của bản thân.",
"Nghĩa vụ phát sinh từ hành vi vi phạm pháp luật của vợ, chồng.",
"Nghĩa vụ vủa mỗi bên vợ, chồng có trước khi kết hôn",
"Tất cả đều sai."
],
c: 3
},
{
q: "Trong trường hợp hai bên kết hôn lựa chọn chế độ tài sản theo thỏa thuận thì thỏa thuận này phải được lập:",
a: [
"Trước khi kết hôn, bằng hình thức văn bản có công chứng hoặc chứng thực",
"Bất kỳ khi nào trong thời kỳ hôn nhân nhằm phù hợp với điều kiện thực tế của gia đình",
"Thỏa thuận bằng lời nói trước khi kết hôn",
"Thỏa thuận bằng văn bản có chữ kỹ của 2 bên không cần công chứng, chứng thực trước khi kết hôn"
],
c: 0
}
];

/* ===== TRỘN ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ===== KHỞI TẠO ===== */
function startQuiz() {
  index = 0;
  score = 0;
  userAnswers = [];

  questions = JSON.parse(JSON.stringify(rawQuestions));
  shuffle(questions);

  questions.forEach(q => {
    const correct = q.a[q.c];
    shuffle(q.a);
    q.c = q.a.indexOf(correct);
  });

  loadQuestion();
}

/* ===== LOAD ===== */
function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index + 1}: ${q.q}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = text;
    div.onclick = () => checkAnswer(div, i);
    answersDiv.appendChild(div);

    if (userAnswers[index] !== undefined) {
      if (i === q.c) div.classList.add("correct");
      if (i === userAnswers[index] && i !== q.c)
        div.classList.add("wrong");
      div.onclick = null;
    }
  });

  updateScore();
}

/* ===== CHỌN ===== */
function checkAnswer(el, i) {
  if (userAnswers[index] !== undefined) return;

  userAnswers[index] = i;

  if (i === questions[index].c) {
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    document.querySelectorAll(".answer")[questions[index].c]
      .classList.add("correct");
  }

  updateScore();
}

/* ===== ĐIỀU HƯỚNG ===== */
function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

/* ===== MODAL ===== */
function showResult() {
  document.getElementById("finalScore").innerText =
    `Đúng: ${score} / ${questions.length}`;
  document.getElementById("resultModal").style.display = "block";
}

function okReload() {
  document.getElementById("resultModal").style.display = "none";
  startQuiz();
}

/* ===== LÀM LẠI ===== */
function resetQuiz() {
  if (confirm("Bạn có chắc muốn làm lại?")) {
    startQuiz();
  }
}

/* ===== ĐIỂM ===== */
function updateScore() {
  document.getElementById("score").innerText =
    `Đúng: ${score} / ${questions.length}`;
}

startQuiz();
function goBack() {
  window.history.back();
}  
</script>
