<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">
  <button class="back-btn" onclick="goBack()">← Trở về</button>
  <div id="score">Đúng: 0 / 0</div>
  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>
</div>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>

  <div class="buttons">
    <button class="nav" onclick="prevQuestion()">← Câu trước</button>
    <button class="nav" onclick="nextQuestion()">Câu tiếp →</button>
  </div>
</div>

<!-- POPUP KẾT QUẢ -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3>🎉 Hoàn thành</h3>
    <p id="finalScore"></p>
    <button onclick="okReload()">OK</button>
  </div>
</div>

<script>
let index = 0;
let score = 0;
let userAnswers = [];
let questions = [];

/* ===== DỮ LIỆU ===== */
const rawQuestions = [
  {
    q: Trong kinh tế thị trường, mục đích cuối cùng của cạnh tranh giữa các nhà tư bản là gì?,
    a: [
      Tăng sản lượng tiêu dùng,
      Giành lấy giá trị thặng dư cao hơn,
      Bảo đảm an toàn cho sản xuất,
      Phát triển lực lượng lao động xã hội
    ],
    c: 1
  },
  {
    q: Nhà kinh điển nào sau đây nghiên cứu sâu về chủ nghĩa tư bản độc quyền?,
    a: [
      C.Mác,
      Ph.Ăng ghen,
      C.Mác và Ăng ghen,
      V.I.Lênin
    ],
    c: 3
  },
  {
    q: Trong giai đoạn chủ nghĩa tư bản độc quyền có những hình thức cạnh tranh nào?,
    a: [
      Cạnh tranh giữa tổ chức độc quyền với xí nghiệp ngoài độc quyền,
      Cạnh tranh giữa các tổ chức độc quyền với nhau,
      Cạnh tranh trong nội bộ tổ chức độc quyền,
      Tất cả các đáp án
    ],
    c: 3
  },
  {
    q: Quy luật kinh tế nào giữ vai trò chi phối cạnh tranh trong sản xuất tư bản chủ nghĩa?,
    a: [
      Quy luật giá trị,
      Quy luật cung - cầu,
      Quy luật lợi nhuận bình quân,
      Quy luật lưu thông tiền tệ
    ],
    c: 0
  },
  {
    q: Tác động tiêu cực của độc quyền đối với nền kinh tế là gì?,
    a: [
      Độc quyền làm cho cạnh tranh không hoàn hảo gây thiệt hại cho người tiêu dùng và xã hội,
      Độc quyền đã phần nào kìm hãm sự tiến bộ kỹ thuật, kìm hãm sự phát triển kinh tế, xã hội,
      Độc quyền chi phối các quan hệ kinh tế, xã hội, làm tăng sự phân hóa giàu nghèo,
      Tất cả các đáp án
    ],
    c: 3
  },
  {
    q: Trong cạnh tranh nội bộ ngành, yếu tố nào quyết định vị thế của từng nhà tư bản?,
    a: [
      Trình độ kỹ thuật và quy mô tư bản,
      Sự ưu đãi của Nhà nước,
      Mức hao phí lao động để sản xuất ra hàng hóa,
      Khả năng tổ chức và quản lý sản xuất của nhà tư bản
    ],
    c: 0
  },
  {
    q: Các tổ chức độc quyền sử dụng hình thức giá cả nào?,
    a: [
      Giá cả thị trường,
      Giá cả độc quyền cao,
      Giá cả độc quyền thấp,
      Giá cả tự do
    ],
    c: 1
  },
  {
    q: Trong chủ nghĩa tư bản độc quyền, vì sao cạnh tranh không bị thủ tiêu?,
    a: [
      Vì các tổ chức độc quyền cạnh tranh với nhau,
      Vì tổ chức độc quyền cạnh tranh với các công ty ngoài độc quyền,
      Vì các xí nghiệp trong nội bộ tổ chức độc quyền cạnh tranh với nhau,
      Vì cạnh tranh là quy luật khách quan của nền kinh tế thị trường
    ],
    c: 3
  },
  {
    q: Nguyên nhân hình thành lợi nhuận độc quyền là gì?,
    a: [
      Do cạnh tranh nội bộ ngành,
      Do sự thèm khát giá trị thặng dư của các nhà tư bản,
      Do địa vị độc quyền đem lại,
      Do quy luật giá cả sản xuất đem lại
    ],
    c: 2
  },
  {
    q: Hãy lựa chọn mệnh đề đúng trong các mệnh đề dưới đây?,
    a: [
      Độc quyền là con đẻ của cạnh tranh, đối lập với cạnh tranh và thủ tiêu cạnh tranh,
      Độc quyền là con đẻ của cạnh tranh, đối lập với cạnh tranh nhưng không thủ tiêu cạnh tranh,
      Cạnh tranh sinh ra độc quyền, chúng không đối lập nhau,
      Tất cả các đáp án
    ],
    c: 1
  },
  {
    q: Trong giai đoạn chủ nghĩa tư bản độc quyền quy luật giá trị có biểu hiện mới là gì?,
    a: [
      Quy luật giá cả sản xuất,
      Quy luật giá cả độc quyền,
      Quy luật lợi nhuận độc quyền,
      Quy luật lợi nhuận bình quân
    ],
    c: 1
  },
  {
    q: Trong giai đoạn chủ nghĩa tư bản tự do cạnh tranh, quy luật giá trị có hình thức biểu hiện là gì?,
    a: [
      Quy luật giá cả thị trường,
      Quy luật giá cả độc quyền,
      Quy luật lợi nhuận bình quân,
      Quy luật giá cả sản xuất
    ],
    c: 3
  },
  {
    q: Trong giai đoạn chủ nghĩa tư bản tự do cạnh tranh, quy luật giá trị thặng dư biểu hiện là gì?,
    a: [
      Quy luật giá cả sản xuất,
      Quy luật tích luỹ tư bản,
      Quy luật tỷ suất lợi nhuận bình quân,
      Quy luật lợi nhuận độc quyền cao
    ],
    c: 2
  },
  {
    q: Trong giai đoạn chủ nghĩa tư bản độc quyền, quy luật giá trị thặng dư biểu hiện là gì?,
    a: [
      Quy luật giá cả độc quyền,
      Quy luật lợi nhuận độc quyền cao,
      Quy luật lợi nhuận bình quân,
      Quy luật giá cả sản xuất
    ],
    c: 1
  },
  {
    q: Khi chủ nghĩa tư bản chuyển từ giai đoạn cạnh tranh tự do sang độc quyền, cạnh tranh có còn tồn tại không?,
    a: [
      Không còn cạnh tranh,
      Cạnh tranh ở mức độ bớt căng thẳng hơn,
      Cạnh tranh trở nên tinh vi hơn,
      Cạnh tranh trở nên khốc liệt hơn
    ],
    c: 2
  }
 
  
];

// ===== BIẾN =====
let questions=[], answers=[], index=0;
let timeLeft=3600, timer;

// ===== HÀM =====
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function startQuiz(){
  questions = shuffle([...questionsAll]);
  answers = new Array(questions.length).fill(null);
  index = 0;
  timeLeft = 3600;
  buildGrid();
  loadQuestion();
  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    document.getElementById("time").innerText =
      `${m}:${s<10?'0':''}${s}`;
    if(timeLeft<=0) finishQuiz();
  },1000);
}

function loadQuestion(){
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index+1}: ${q.q}`;
  const box = document.getElementById("answers");
  box.innerHTML="";
  q.a.forEach((text,i)=>{
    const d=document.createElement("div");
    d.className="answer";
    d.innerText=text;
    if(answers[index]===i) d.classList.add("selected");
    d.onclick=()=>{
      answers[index]=i;
      loadQuestion();
      updateGrid();
    };
    box.appendChild(d);
  });
}

function nextQuestion(){ if(index<questions.length-1){ index++; loadQuestion(); } }
function prevQuestion(){ if(index>0){ index--; loadQuestion(); } }

function buildGrid(){
  const g=document.getElementById("questionGrid");
  g.innerHTML="";
  questions.forEach((_,i)=>{
    const b=document.createElement("button");
    b.innerText=i+1;
    b.onclick=()=>{ index=i; loadQuestion(); };
    g.appendChild(b);
  });
}

function updateGrid(){
  document.querySelectorAll("#questionGrid button")
    .forEach((b,i)=> b.className = answers[i]!=null ? "done" : "");
}

function toggleGrid(){
  const g=document.getElementById("questionGrid");
  const b=document.getElementById("toggleBtn");
  g.classList.toggle("hidden");
  b.innerText=g.classList.contains("hidden")
    ?"📋 Hiện bảng câu":"❌ Ẩn bảng câu";
}

function finishQuiz(){
  clearInterval(timer);
  let correct=0;
  questions.forEach((q,i)=>{ if(answers[i]===q.c) correct++; });
  const score=(correct/questions.length*10).toFixed(2);
  alert(`Hoàn thành!\nĐúng: ${correct}/${questions.length}\nĐiểm: ${score}`);
}

function restartQuiz(){
  if(confirm("Bạn có chắc muốn làm lại từ đầu?")){
    startQuiz();
  }
}

function goBack(){
  if(confirm("Bạn có chắc muốn quay lại? Bài làm sẽ bị mất.")){
    window.history.back();
  }
}

// ===== CHẠY =====
startQuiz();
</script>

</body>
</html>
