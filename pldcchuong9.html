<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">
  <button class="back-btn" onclick="goBack()">← Trở về</button>
  <div id="score">Đúng: 0 / 0</div>
  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>
</div>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>

  <div class="buttons">
    <button class="nav" onclick="prevQuestion()">← Câu trước</button>
    <button class="nav" onclick="nextQuestion()">Câu tiếp →</button>
  </div>
</div>

<!-- POPUP KẾT QUẢ -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h3>🎉 Hoàn thành</h3>
    <p id="finalScore"></p>
    <button onclick="okReload()">OK</button>
  </div>
</div>

<script>
let index = 0;
let score = 0;
let userAnswers = [];
let questions = [];

/* ===== DỮ LIỆU ===== */
const rawQuestions = [
{
q: "Luật Phòng chống tham nhũng quy định công dân có quyền gì:",
a: [
"Thẩm tra, xác minh hành vi tham nhũng",
"Điều tra, thanh tra hành vi tham nhũng",
"Đấu tranh với hành vi tham nhũng",
"Phát hiện, tố cáo hành vi tham nhũng"
],
c: 3
},
{

a: [
"Cấm các phương tiện thông tin đại chúng đưa tin về tham nhũng",
"Cấm các cơ quan tổ chức cung cấp thông tin về tham nhũng cho các cơ quan đại chúng",
"Cấm đe dọa, trả thù, trù dập người phát hiện và tố cáo hành vi tham nhũng",
"Không quy định điều cấm"
],
c: 2
},
{
q: "Pháp luật quy định tham nhũng là:",
a: [
"Hành vi của người có chức vụ.",
"Hành vi của người lợi dụng chức vụ, quyền hạn đó vì vụ lợi.",
"Hành vi lợi dụng chức vụ, quyền hạn của người có chức vụ, quyền hạn.",
"Hành vi của người có chức vụ, quyền hạn đã lợi dụng chức vụ, quyền hạn đó vì vụ lợi."
],
c: 3
},
{
q: "Người có chức vụ, quyền hạn theo Luật Phòng, chống tham nhũng năm 2018 bao gồm những người:",
a: [
"Cán bộ, công chức, viên chức;",
"Cán bộ, công chức, viên chức; Sĩ quan, quân nhân chuyên nghiệp, công nhân, viên chức quốc phòng trong cơ quan, đơn vị thuộc Quân đội nhân dân",
"Cán bộ, công chức, viên chức; Sĩ quan, quân nhân chuyên nghiệp, công nhân, viên chức quốc phòng trong cơ quan, đơn vị thuộc Quân đội nhân dân; sĩ quan, hạ sĩ quan nghiệp vụ, sĩ quan, hạ sĩ quan chuyên môn kỹ thuật trong đơn vị thuộc Công an nhân dân.",
"Cán bộ, công chức, viên chức; Sĩ quan, quân nhân chuyên nghiệp, công nhân, viên chức quốc phòng trong cơ quan, đơn vị thuộc Quân đội nhân dân; sĩ quan, hạ sĩ quan nghiệp vụ, sĩ quan, hạ sĩ quan chuyên môn kỹ thuật, công nhân công an trong cơ quan, đơn vị thuộc Công an nhân dân"

{

a: [
"Tham ô tài sản",
"Lạm dụng chức vụ quyền hạn chiếm đoạt tài sản",
"Lợi dụng chức vụ, quyền hạn trong khi thi hành nhiệm vụ, công vụ vì vụ lợi",
"Lợi dụng chức vụ, quyền hạn sử dụng trái phép tài sản"
],
c: 0
},
{
q: "Câu nào đúng về nguyên tắc xử lý tham nhũng theo Luật PCTN",
a: [
"Mọi hành vi tham nhũng đều phải được phát hiện và ngăn chặn",
"Mọi hành vi tham nhũng đều phải được phát hiện, ngăn chặn và xử lý kịp thời nghiêm minh",
"Mọi hành vi tham nhũng đều phải được xử lý kịp thời",
"Mọi hành vi tham nhũng đều phải được phát hiện, xử lý kịp thời"
],
c: 1
},
{

a: [
"Sử dụng tài sản của Nhà nước vượt chế độ, định mức, tiêu chuẩn;",
"Cửa quyền, hách dịch, gây khó khăn, phiền hà khi thực hiện nhiệm vụ, công vụ nhằm đòi hỏi, ép buộc cơ quan, tổ chức, cá nhân khác phải nộp những khoản chi phí ngoài quy định;",
"Sử dụng chức vụ, quyền hạn, ảnh hưởng của mình để gây khó khăn cho việc kiểm tra, thanh tra, kiểm toán, điều tra, truy tố, xét xử, thi hành án hoặc làm sai lệch kết quả các hoạt động trên;",
"Hối lộ, môi giới hối lộ để được giao, phê duyệt dự án cho cơ quan, tổ chức, đơn vị, địa phương"
],

q: "Hành vi nào sau đây được xác định là hành vi tham nhũng:",
a: [
"Lợi dụng chức vụ, quyền hạn gây ảnh hưởng với người khác;",
"Lạm dụng tín nhiệm chiếm đoạt tài sản;",
"Trộm cắp tài sản nhà nước.",

c: 3
},

"Bị coi là phạm tội nhận hối lộ nếu của hối lộ có giá trị từ 5 triệu đồng trở lên",
"Không bị coi là phạm tội nhận hối lộ",
"Bị coi là phạm tội nhận hối lộ nếu của hối lộ có giá trị từ 2 triệu đồng trở lên hoặc dưới 2 triệu đồng nhưng gây hậu quả nghiêm trọng"
],
c: 3
},
{
q: "Hành vi nào dưới đây bị coi là hành vi tham nhũng.",
a: [
"Lạm quyền trong khi thi hành công vụ",
"Vượt quá quyền hạn trong khi thực thi nhiệm vụ",
"Lạm quyền vì vụ lợi",
"Lạm quyền trong khi thi hành công vụ vì vụ lợi"
],
c: 3
},
{
q: "Người có hành vi tham ô tài sản",
a: [
"Đều bị coi là phạm tội tham ô tài sản",
"Không bị coi là phạm tội tham ô tài sản",
"Bị coi là phạm tội tham ô tài sản nếu tài sản tham ô có giá trị từ 2 triệu đồng trở lên hoặc dưới 2 triệu đồng nhưng gây hậu quả nghiêm trọng",
"Bị coi là phạm tội tham ô tài sản nếu tài sản tham ô có giá trị từ 5 triệu đồng trở lên"
],
c: 2
},
{
q: "Hành vi nào dưới đây bị coi là hành vi tham nhũng:",
a: [
"Lợi dụng chức vụ quyền hạn gây ảnh hưởng với người khác để trục lợi",
"Gây trở ngại cho người khác để làm lợi cho bản thân",
"Cản trở công việc của người khác",
"Cản trở công việc của người khác vì vụ lợi"
],
c: 0
},
{
q: "Hành vi nào dưới đây bị coi là hành vi tham nhũng.",

"Mạo danh trong khi thực hiện nhiệm vụ",
"Giả mạo trong công tác vì vụ lợi",
"Giả mạo giấy tờ",
"Mạo danh vì vụ lợi"
],
c: 1
},
{
q: "Hành vi nào dưới đây bị coi là hành vi tham nhũng.",
a: [
"Nhũng nhiễu vì vụ lợi",
"Gây khó khăn phiền hà cho dân",
"Cửa quyền hách dịch khi thi hành công vụ",
"Gây khó khăn phiền hà cho dân khi thi hành công vụ"
],
c: 0
},
{
q: "Hành vi nào dưới đây không bị coi là hành vi tham nhũng.",

"Nhận hối lộ",

"Sử dụng tài sản của cơ quan lên đến 1 triệu đồng",
"Lợi dụng chức vụ quyền hạn sử dụng trái phép tài sản của nhà nước vì vụ lợi"
],
c: 2
},
{

a: [
"Chấp hành nghiêm chỉnh pháp luật về phòng, chống tham nhũng",
"Lên án, đấu tranh, truy bắt, giam giữ những người có hành vi tham nhũng",
"Phát hiện, tố cáo hành vi tham nhũng",
"Hợp tác với các cơ quan có thẩm quyền trong việc xác minh, xử lý hành vi tham nhũng"
],
c: 1
},
{
q: "Theo Luật Phòng chống tham nhũng, người tố cáo hành vi tham nhũng có trách nhiệm nào sau đây?",
a: [
"Phải gửi đơn đến đúng cơ quan có thẩm quyền giải quyết tố cáo",
"Phải chịu trách nhiệm trước pháp luật về tính trung thực của nội dung phản ánh, báo cáo",
"Phải nộp lệ phí cho cơ quan thụ lý đơn tố cáo",
"Tất cả các đáp án"
],
c: 1
}
];

/* ===== TRỘN ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ===== KHỞI TẠO ===== */
function startQuiz() {
  index = 0;
  score = 0;
  userAnswers = [];

  questions = JSON.parse(JSON.stringify(rawQuestions));
  shuffle(questions);

  questions.forEach(q => {
    const correct = q.a[q.c];
    shuffle(q.a);
    q.c = q.a.indexOf(correct);
  });

  loadQuestion();
}

/* ===== LOAD ===== */
function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index + 1}: ${q.q}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = text;
    div.onclick = () => checkAnswer(div, i);
    answersDiv.appendChild(div);

    if (userAnswers[index] !== undefined) {
      if (i === q.c) div.classList.add("correct");
      if (i === userAnswers[index] && i !== q.c)
        div.classList.add("wrong");
      div.onclick = null;
    }
  });

  updateScore();
}

/* ===== CHỌN ===== */
function checkAnswer(el, i) {
  if (userAnswers[index] !== undefined) return;

  userAnswers[index] = i;

  if (i === questions[index].c) {
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    document.querySelectorAll(".answer")[questions[index].c]
      .classList.add("correct");
  }

  updateScore();
}

/* ===== ĐIỀU HƯỚNG ===== */
function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

/* ===== MODAL ===== */
function showResult() {
  document.getElementById("finalScore").innerText =
    `Đúng: ${score} / ${questions.length}`;
  document.getElementById("resultModal").style.display = "block";
}

function okReload() {
  document.getElementById("resultModal").style.display = "none";
  startQuiz();
}

/* ===== LÀM LẠI ===== */
function resetQuiz() {
  if (confirm("Bạn có chắc muốn làm lại?")) {
    startQuiz();
  }
}

/* ===== ĐIỂM ===== */
function updateScore() {
  document.getElementById("score").innerText =
    `Đúng: ${score} / ${questions.length}`;
}

startQuiz();
function goBack() {
  window.history.back();
}  
</script>

</body>
</html>
